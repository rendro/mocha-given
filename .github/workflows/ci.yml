name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  # The interface plugs directly into mocha's own API, so mocha's version is
  # the real risk surface, not Node's.
  mocha-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mocha: [8, 9, 10, 11]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save mocha@${{ matrix.mocha }}
      - run: npm test
